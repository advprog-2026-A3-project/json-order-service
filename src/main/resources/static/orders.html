<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - JSON Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .btn-warning {
            background: #ffa502;
            color: white;
        }

        .btn-warning:hover {
            background: #ff9100;
        }

        .btn-success {
            background: #2ed573;
            color: white;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .orders-grid {
            display: grid;
            gap: 20px;
        }

        .order-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .order-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .order-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .order-detail-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
        }

        .order-detail-label {
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        .order-detail-value {
            color: #333;
            font-size: 16px;
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-paid {
            background: #cfe2ff;
            color: #084298;
        }

        .status-purchased {
            background: #d1e7f5;
            color: #0c5460;
        }

        .status-shipped {
            background: #d3d8eb;
            color: #383d92;
        }

        .status-completed {
            background: #d1e7dd;
            color: #0f5132;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group button {
            flex: 1;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .order-detail {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Order Management</h1>
            <p>JSON - Jastip Online Nasional Platform</p>
        </header>

        <div class="content">
            <div id="alert" class="alert"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('create')">➕ Create Order</button>
                <button class="tab-btn" onclick="switchTab('view')">👁️ View Orders</button>
                <button class="tab-btn" onclick="switchTab('edit')">✏️ Edit Order</button>
            </div>

            <!-- CREATE ORDER TAB -->
            <div id="create" class="tab-content active">
                <h2>Create New Order</h2>
                <form id="createForm" onsubmit="handleCreateOrder(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productId">Product ID *</label>
                            <input type="text" id="productId" required>
                        </div>
                        <div class="form-group">
                            <label for="productName">Product Name</label>
                            <input type="text" id="productName">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantity">Quantity *</label>
                            <input type="number" id="quantity" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="shippingAddress">Shipping Address *</label>
                            <input type="text" id="shippingAddress" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="titiperUserId">Buyer User ID *</label>
                            <input type="text" id="titiperUserId" required>
                        </div>
                        <div class="form-group">
                            <label for="jastiperUserId">Jastiper User ID</label>
                            <input type="text" id="jastiperUserId">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="totalPrice">Total Price</label>
                        <input type="number" id="totalPrice" min="0" step="0.01">
                    </div>

                    <button type="submit" class="btn btn-primary">Create Order</button>
                </form>
            </div>

            <!-- VIEW ORDERS TAB -->
            <div id="view" class="tab-content">
                <h2>My Orders</h2>

                <div class="form-group">
                    <label for="searchUserId">Search by User ID</label>
                    <input type="text" id="searchUserId" placeholder="Enter buyer user ID...">
                    <button class="btn btn-primary" onclick="handleViewOrders()" style="margin-top: 10px;">Search</button>
                </div>

                <div id="ordersContainer" class="orders-grid" style="margin-top: 20px;"></div>
            </div>

            <!-- EDIT ORDER TAB -->
            <div id="edit" class="tab-content">
                <h2>Edit Order</h2>

                <div class="form-group">
                    <label for="editOrderId">Order ID to Edit *</label>
                    <input type="number" id="editOrderId" min="1" required>
                    <button class="btn btn-primary" onclick="handleLoadOrder()" style="margin-top: 10px;">Load Order</button>
                </div>

                <div id="editFormContainer" style="display: none;">
                    <hr style="margin: 20px 0;">
                    <h3>Order Details</h3>
                    <form id="editForm" onsubmit="handleUpdateOrder(event)">
                        <div class="form-group">
                            <label>Order ID</label>
                            <input type="number" id="editFormOrderId" disabled>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="editProductName">Product Name</label>
                                <input type="text" id="editProductName">
                            </div>
                            <div class="form-group">
                                <label for="editQuantity">Quantity</label>
                                <input type="number" id="editQuantity" min="1">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="editShippingAddress">Shipping Address</label>
                            <input type="text" id="editShippingAddress">
                        </div>

                        <div class="form-group">
                            <label for="editStatus">Status</label>
                            <select id="editStatus">
                                <option value="PENDING">PENDING</option>
                                <option value="PAID">PAID</option>
                                <option value="PURCHASED">PURCHASED</option>
                                <option value="SHIPPED">SHIPPED</option>
                                <option value="COMPLETED">COMPLETED</option>
                                <option value="CANCELLED">CANCELLED</option>
                            </select>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-warning">Update Order</button>
                            <button type="button" class="btn btn-danger" onclick="handleDeleteOrder()">Delete Order</button>
                            <button type="button" class="btn btn-success" onclick="handleCancelOrder()">Cancel Order</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/order/api';

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            setTimeout(() => {
                alert.className = 'alert';
            }, 5000);
        }

        async function handleCreateOrder(e) {
            e.preventDefault();

            const request = {
                productId: document.getElementById('productId').value,
                productName: document.getElementById('productName').value,
                quantity: parseInt(document.getElementById('quantity').value),
                shippingAddress: document.getElementById('shippingAddress').value,
                titiperUserId: document.getElementById('titiperUserId').value,
                jastiperUserId: document.getElementById('jastiperUserId').value || null,
                totalPrice: parseFloat(document.getElementById('totalPrice').value) || null
            };

            try {
                const response = await fetch(`${API_BASE}/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Order created successfully! ID: ${data.id}`, 'success');
                    document.getElementById('createForm').reset();
                } else {
                    showAlert(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Failed to create order: ${error.message}`, 'error');
            }
        }

        async function handleViewOrders() {
            const userId = document.getElementById('searchUserId').value;
            if (!userId) {
                showAlert('❌ Please enter a user ID', 'error');
                return;
            }

            const container = document.getElementById('ordersContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/my-orders/${userId}`);
                const orders = await response.json();

                if (orders.length === 0) {
                    container.innerHTML = '<p>No orders found for this user</p>';
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <h3>Order #${order.id}</h3>
                        <div class="order-detail">
                            <div class="order-detail-item">
                                <div class="order-detail-label">Status</div>
                                <div class="order-detail-value">
                                    <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span>
                                </div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Product ID</div>
                                <div class="order-detail-value">${order.productId}</div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Product Name</div>
                                <div class="order-detail-value">${order.productName || 'N/A'}</div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Quantity</div>
                                <div class="order-detail-value">${order.quantity}</div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Total Price</div>
                                <div class="order-detail-value">Rp ${(order.totalPrice || 0).toLocaleString('id-ID')}</div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Shipping Address</div>
                                <div class="order-detail-value">${order.shippingAddress}</div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Created</div>
                                <div class="order-detail-value">${new Date(order.createdAt).toLocaleString()}</div>
                            </div>
                            <div class="order-detail-item">
                                <div class="order-detail-label">Updated</div>
                                <div class="order-detail-value">${new Date(order.updatedAt).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showAlert(`❌ Failed to load orders: ${error.message}`, 'error');
                container.innerHTML = '';
            }
        }

        async function handleLoadOrder() {
            const orderId = document.getElementById('editOrderId').value;
            if (!orderId) {
                showAlert('❌ Please enter an order ID', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${orderId}`);
                const order = await response.json();

                if (response.ok) {
                    document.getElementById('editFormOrderId').value = order.id;
                    document.getElementById('editProductName').value = order.productName || '';
                    document.getElementById('editQuantity').value = order.quantity;
                    document.getElementById('editShippingAddress').value = order.shippingAddress;
                    document.getElementById('editStatus').value = order.status;
                    document.getElementById('editFormContainer').style.display = 'block';
                } else {
                    showAlert(`❌ Order not found`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Failed to load order: ${error.message}`, 'error');
            }
        }

        async function handleUpdateOrder(e) {
            e.preventDefault();

            const orderId = document.getElementById('editFormOrderId').value;
            const updateRequest = {
                productName: document.getElementById('editProductName').value,
                quantity: parseInt(document.getElementById('editQuantity').value),
                shippingAddress: document.getElementById('editShippingAddress').value,
                status: document.getElementById('editStatus').value
            };

            try {
                const response = await fetch(`${API_BASE}/${orderId}/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateRequest)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Order updated successfully!`, 'success');
                } else {
                    showAlert(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Failed to update order: ${error.message}`, 'error');
            }
        }

        async function handleDeleteOrder() {
            const orderId = document.getElementById('editFormOrderId').value;
            if (!confirm('Are you sure you want to delete this order?')) return;

            try {
                const response = await fetch(`${API_BASE}/${orderId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert(`✅ Order deleted successfully!`, 'success');
                    document.getElementById('editFormContainer').style.display = 'none';
                    document.getElementById('editOrderId').value = '';
                } else {
                    const data = await response.json();
                    showAlert(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Failed to delete order: ${error.message}`, 'error');
            }
        }

        async function handleCancelOrder() {
            const orderId = document.getElementById('editFormOrderId').value;
            const reason = prompt('Enter cancellation reason:');
            if (!reason) return;

            try {
                const response = await fetch(`${API_BASE}/${orderId}/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Order cancelled successfully!`, 'success');
                    document.getElementById('editStatus').value = 'CANCELLED';
                } else {
                    showAlert(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Failed to cancel order: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
