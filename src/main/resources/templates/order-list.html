<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JSON | Transaction History</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 50px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 10px;
        }
        h1 { color: #D4AF37; margin: 0; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #2c2c2c;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #D4AF37;
            color: black;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #444;
        }
        tr:hover { background: #383838; }
        .status-badge {
            background: #444;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #FFD700;
            border: 1px solid #D4AF37;
        }
        .btn-add {
            text-decoration: none;
            background: var(--gold-primary);
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Transaction History</h1>
    <a href="/order/create" class="btn-add">+ New Jastip Order</a>
</div>

<table>
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Product</th>
        <th>Destination</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${'#JSON-' + order.id}"></td>
        <td th:text="${order.productName}" style="font-weight: bold;"></td>
        <td th:text="${order.shippingAddress}"></td>
        <td>
            <span class="status-badge" th:text="${order.status}"></span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
