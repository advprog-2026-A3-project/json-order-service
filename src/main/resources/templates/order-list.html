<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order List</title>
    <link rel="stylesheet" th:href="@{/css/order.css}">
</head>
<body>
<main class="page">
    <header class="topbar">
        <div>
            <h1>Order Dashboard</h1>
            <p class="subtitle">Kelola transaksi order dengan tampilan bersih dan cepat.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/order/create}">+ New Order</a>
    </header>

    <div class="alert alert-success" data-autohide="true" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-error" data-autohide="true" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="card">
        <div class="table-wrap" th:if="${!orders.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Product</th>
                    <th>Titiper</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Destination</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${'#JSON-' + order.id}"></td>
                    <td>
                        <strong th:text="${order.productName}"></strong><br>
                        <span th:text="${order.productId}"></span>
                    </td>
                    <td th:text="${order.titiperUserId}"></td>
                    <td th:text="${order.quantity}"></td>
                    <td th:text="${order.totalPrice}"></td>
                    <td th:text="${order.shippingAddress}"></td>
                    <td><span class="status-pill" th:text="${order.status}"></span></td>
                    <td>
                        <div class="row-actions">
                            <a class="btn btn-secondary" th:href="@{/order/edit/{id}(id=${order.id})}">Edit</a>
                            <form class="js-delete-form" th:action="@{/order/delete/{id}(id=${order.id})}" method="post" th:attr="data-product=${order.productName}">
                                <button class="btn btn-danger" type="submit">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${orders.isEmpty()}">
            Belum ada order tersimpan. Klik <strong>New Order</strong> untuk menambahkan data pertama.
        </div>
    </section>
</main>

<script th:src="@{/js/order.js}"></script>
</body>
</html>
