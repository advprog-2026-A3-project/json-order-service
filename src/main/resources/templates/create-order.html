<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JSON | Premium Checkout</title>
    <style>
        :root {
            --gold-primary: linear-gradient(45deg, #D4AF37, #FFD700);
            --dark-bg: #1a1a1a;
            --card-bg: #2c2c2c;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #D4AF37;
            width: 400px;
        }
        h1 {
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #D4AF37; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        input:focus { border-color: #FFD700; outline: none; }
        .btn-gold {
            width: 100%;
            padding: 15px;
            background: var(--gold-primary);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>JSON Premium</h1>
    <p style="text-align: center; color: #888;">Secure your limited item now</p>
    <form th:action="@{/order/create}" th:object="${order}" method="post">
        <div class="form-group">
            <label>Exclusive Item</label>
            <input type="text" th:field="*{productName}" placeholder="e.g. Limited Sushi" required/>
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" min="1" required/>
        </div>
        <div class="form-group">
            <label>Shipping Destination</label>
            <textarea th:field="*{shippingAddress}" rows="3" placeholder="Enter your full address" required></textarea>
        </div>
        <button type="submit" class="btn-gold">CONFIRM PURCHASE</button>
    </form>
</div>
</body>
</html>
