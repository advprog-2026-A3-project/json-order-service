# Production Profile - Supabase PostgreSQL (online)
# Never hardcode credentials in repository.

spring.datasource.url=${SUPABASE_JDBC_URL:jdbc:postgresql://db.rliuwswamdmjjvqfgfby.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres.rliuwswamdmjjvqfgfby}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:15}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=OrderHikariPool
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

logging.level.id.ac.ui.cs.advprog.order=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
