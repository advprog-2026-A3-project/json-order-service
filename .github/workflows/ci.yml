name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  # --- STAGE 1: CI (Quality & Testing) ---
  quality-check:
    name: Unit Testing & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Penting untuk SonarCloud

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/setup-gradle@v3

      # Jalankan Testing & Jacoco untuk Coverage
      - name: Run Tests & Jacoco Report
        run: ./gradlew test jacocoTestReport

      # Cek Coverage (Gagal jika di bawah 100%)
      - name: Verify Coverage (100%)
        run: ./gradlew jacocoTestCoverageVerification

      # Analisis Kode dengan SonarCloud
      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

  # --- STAGE 2: CD (Auto Deployment) ---
  deploy:
    name: Deployment (Dummy)
    runs-on: ubuntu-latest
    # GUARD: CD hanya jalan jika quality-check LULUS
    needs: quality-check
    # CD hanya jalan saat PUSH ke branch tertentu, bukan saat Pull Request
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Logika pemisahan Staging vs Production
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          echo "🚀 Deploying to STAGING environment..."
          echo "Status: CI Passed, Quality OK. Ready for Testing."

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔥 Deploying to PRODUCTION environment..."
          echo "Status: Critical checks passed. Going Live."