name: Java CI with Gradle

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup and Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Fix gradlew line endings (CRLF -> LF)
        run: sed -i 's/\r$//' gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test (with JaCoCo report)
        run: ./gradlew --no-daemon --build-cache --parallel clean test jacocoTestReport jacocoTestCoverageVerification -PjacocoMinimum=0.85 --stacktrace

      - name: SonarCloud analysis
        id: sonar_scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew --no-daemon --build-cache --parallel sonar --stacktrace

      - name: SonarCloud scanner warning
        if: ${{ steps.sonar_scan.outcome == 'failure' }}
        run: echo "::warning::Sonar scanner command failed. Verify SONAR_TOKEN or SonarCloud automatic analysis settings."