name: CD to AWS EC2

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]

jobs:
  deploy:
    name: Deploy Docker app to EC2
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'staging') }}
    runs-on: ubuntu-22.04

    environment:
      name: production

    steps:
      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "DEPLOY_SHA='$DEPLOY_SHA' bash -se" << 'EOF'
            set -e

            cd ~/json-order-service

            git fetch --no-tags origin "$DEPLOY_SHA"
            git checkout --detach "$DEPLOY_SHA"

            sudo docker rm -f json-order-service || true
            sudo docker build -t json-order-service .
            sudo docker run -d \
              --name json-order-service \
              --restart unless-stopped \
              --env-file .env \
              -e SPRING_PROFILES_ACTIVE=prod \
              -p 80:8080 \
              json-order-service

            sudo docker ps
          EOF

      - name: Publish deploy link
        run: |
          echo "### Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "http://${{ secrets.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
